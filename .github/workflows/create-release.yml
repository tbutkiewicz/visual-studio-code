name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install && mkdir -p ./bin

      - run: npm run package

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ./bin/omni.vsix
